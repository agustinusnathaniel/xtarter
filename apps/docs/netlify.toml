[build]
  command = "pnpm docs:build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"
  COREPACK_INTEGRITY_KEYS = "0"

[dev]
  command = "pnpm docs:dev"
  port = 4321

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' umami.sznm.dev; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://og.sznm.dev; font-src 'self'; connect-src 'self' https://umami.sznm.dev https://api.github.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'"
