name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "**/CHANGELOG.md"
      - "**/package.json"
      - ".github/workflows/release.yml"
      - "pnpm-lock.yaml"
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore:
      - "apps/docs/**"
      - "*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build CLI
        run: pnpm build:cli

      - name: Verify CLI binaries have shebangs
        run: pnpm verify:shebangs

      - name: Create Release Pull Request or Publish
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
