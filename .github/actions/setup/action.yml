name: 'Xstarter Setup'
description: 'Install dependencies with pnpm and restore Turborepo cache'
runs:
  using: 'composite'
  steps:
    - uses: pnpm/setup@v1
      with:
        cache: true
    - name: Restore Turborepo cache
      uses: actions/cache@v6
      with:
        path: .turbo/cache
        key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}
        restore-keys: |
          turbo-${{ runner.os }}-
